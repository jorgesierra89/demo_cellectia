name: 🔴 Bajar a CPU Basic
on:
  workflow_dispatch:

jobs:
  change-hardware:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar librería Hugging Face
        run: pip install huggingface_hub
      - name: Cambiar a CPU Gratis
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          api = HfApi(token='$HF_TOKEN')
          api.request_space_hardware(repo_id='demo-cellectia/demo-cellectia', hardware='cpu-basic')
          print('Orden de bajada enviada con éxito')
          "
